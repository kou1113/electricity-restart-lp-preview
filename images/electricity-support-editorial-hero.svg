<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">突然電気が消えて電話で相談する女性</title>
  <desc id="desc">照明が消えた部屋で、スマートフォンを持った女性が電気の再開窓口へ相談しようとしているフラットイラスト</desc>
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a2340"/><stop offset="1" stop-color="#173f68"/></linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#245f91"/><stop offset="1" stop-color="#102e50"/></linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff9a3d"/><stop offset="1" stop-color="#f06c19"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#031323" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#room)"/>
  <circle cx="1350" cy="160" r="310" fill="#2b6590" opacity=".12"/>
  <circle cx="1170" cy="670" r="420" fill="#061a31" opacity=".2"/>

  <!-- Window and quiet city -->
  <rect x="1160" y="95" width="335" height="380" rx="18" fill="#07192c" opacity=".55"/>
  <rect x="1180" y="115" width="295" height="340" rx="10" fill="url(#window)"/>
  <path d="M1327 115v340M1180 285h295" stroke="#8cb4d1" stroke-opacity=".28" stroke-width="8"/>
  <path d="M1180 390l62-56 54 44 72-72 107 78v71h-295z" fill="#0b223b"/>
  <g fill="#ffd65a" opacity=".8"><rect x="1217" y="394" width="9" height="12" rx="2"/><rect x="1260" y="383" width="9" height="12" rx="2"/><rect x="1392" y="390" width="9" height="12" rx="2"/></g>

  <!-- switched-off pendant light -->
  <path d="M1040 0v135" stroke="#071523" stroke-width="13"/>
  <path d="M942 230c12-64 49-99 98-99s86 35 98 99z" fill="#091827" stroke="#56738c" stroke-width="5"/>
  <ellipse cx="1040" cy="230" rx="98" ry="17" fill="#10263b"/>
  <circle cx="1040" cy="215" r="25" fill="#8ca0ad" opacity=".35"/>
  <path d="M925 270l-35 13M1154 270l35 13" stroke="#ffca3a" stroke-width="10" stroke-linecap="round"/>

  <!-- Sofa -->
  <rect x="830" y="610" width="690" height="210" rx="65" fill="#0a2039"/>
  <rect x="870" y="570" width="300" height="155" rx="42" fill="#143a60"/>
  <rect x="1185" y="570" width="285" height="155" rx="42" fill="#143a60"/>
  <path d="M825 785h700v80H825z" fill="#081a2d"/>

  <!-- Person, deliberately geometric/editorial -->
  <g filter="url(#shadow)">
    <path d="M1100 475c104 0 190 75 205 187l20 154H930l21-158c15-108 62-183 149-183z" fill="#f17a3a"/>
    <path d="M1028 534c35 46 91 54 144 3l26 279H979z" fill="#f58b4e"/>
    <ellipse cx="1090" cy="394" rx="108" ry="123" fill="#f3c5a4"/>
    <path d="M987 407c-10-106 36-178 120-178 78 0 130 61 116 173-18-24-36-67-42-100-48 42-111 69-194 71z" fill="#25344c"/>
    <path d="M1182 300c40 35 50 91 30 145l-20-36-11-109z" fill="#25344c"/>
    <circle cx="1052" cy="401" r="9" fill="#263348"/><circle cx="1132" cy="401" r="9" fill="#263348"/>
    <ellipse cx="1096" cy="451" rx="18" ry="23" fill="#9f4f4b"/>
    <ellipse cx="1096" cy="462" rx="9" ry="6" fill="#e98f84" opacity=".75"/>
    <path d="M1024 367c17-13 34-14 51-4M1111 361c17-8 35-5 49 7" fill="none" stroke="#263348" stroke-width="8" stroke-linecap="round"/>
    <circle cx="1070" cy="430" r="5" fill="#e89a88"/><circle cx="1154" cy="430" r="5" fill="#e89a88"/>
    <!-- surprised hand -->
    <path d="M1213 492c18-45 32-83 44-115 7-20 35-10 29 11l-10 39 27-31c15-18 40 1 25 19l-41 50-20 73z" fill="#f3c5a4"/>
    <!-- phone hand and phone -->
    <path d="M1016 605c-41-21-63-39-73-65-8-22 19-34 31-14l22 28 20-1z" fill="#f3c5a4"/>
    <g transform="rotate(-8 956 510)"><rect x="918" y="432" width="76" height="138" rx="15" fill="url(#phone)" stroke="#fff" stroke-width="5"/><circle cx="956" cy="449" r="6" fill="#17304a"/><path d="M941 542h30" stroke="#fff" stroke-width="6" stroke-linecap="round"/></g>
  </g>

  <!-- Clear surprise symbols -->
  <g fill="none" stroke="#ffd23f" stroke-width="15" stroke-linecap="round"><path d="M1272 235l24-45M1314 260l48-22M965 328l-35-33"/></g>
  <circle cx="1378" cy="235" r="9" fill="#ff8a35"/><circle cx="929" cy="278" r="8" fill="#ffd23f"/>

  <!-- small reassurance cue from phone -->
  <path d="M895 405c-38 0-69 27-69 60s31 60 69 60h15l19 22 2-25c20-10 34-31 34-57 0-33-31-60-70-60z" fill="#fff" opacity=".96"/>
  <path d="M858 465l19 18 38-43" fill="none" stroke="#1f82bd" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
